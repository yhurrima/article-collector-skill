<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fa;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 16px; color: #1f2329; }
    .header .dot {
      width: 8px; height: 8px;
      background: #34c759; border-radius: 50%;
    }
    .url-box {
      background: white;
      border: 1px solid #dee0e3;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #646a73;
      word-break: break-all;
      min-height: 40px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #36bfaf;
      color: white;
    }
    .btn-primary:hover { background: #2da89a; }
    .btn-primary:disabled { background: #9aded6; cursor: not-allowed; }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      display: block;
      background: #e8f8ed;
      color: #1e7e34;
    }
    .status.error {
      display: block;
      background: #fde8e8;
      color: #d1242f;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #8f959e;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h1>Article Collector</h1>
  </div>

  <div class="url-box" id="urlBox">检测中...</div>

  <button class="btn btn-primary" id="saveBtn">收藏到飞书</button>

  <div class="status" id="status"></div>
  <div class="hint">点击后将自动处理内容并写入飞书</div>

  <script src="popup.js"></script>
</body>
</html>
